<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">


<button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>


<div class="particles"></div>

<div class="login-container">

<div class="login-left">

<div class="brand" onclick="goHome()">
<img src="assets/logo.png" class="logo">
<h1>CareHome Energy</h1>
</div>

<p class="tagline">
Smart energy monitoring for efficient care homes 
</p>

</div>


<div class="login-right">

<div class="login-box">

<h2 id="roleTitle"></h2>

<input type="text" id="userid" placeholder="User ID">


<div class="password-wrapper">
<input type="password" id="password" placeholder="Password">
<span onclick="togglePassword()" id="eye">👁️</span>
</div>

<button onclick="login()">Login</button>

<p id="errorMsg"></p>

</div>

</div>

</div>

<script src="js/data.js"></script>

<script>
let role = localStorage.getItem("role") || "resident"

document.getElementById("roleTitle").innerText =
role.charAt(0).toUpperCase() + role.slice(1) + " Login"

function login(){

let user = document.getElementById("userid")
let pass = document.getElementById("password")
let error = document.getElementById("errorMsg")

let id = user.value.toLowerCase()
let password = pass.value

if(users[id] && users[id].password === password){

localStorage.setItem("currentUser",id)

if(role==="resident") window.location="pages/resident.html"
if(role==="manager") window.location="pages/manager.html"
if(role==="admin") window.location="pages/admin.html"

}else{

error.innerText = "Invalid login credentials"
error.style.opacity = 1

user.classList.add("error")
pass.classList.add("error")

setTimeout(()=>{
user.classList.remove("error")
pass.classList.remove("error")
},300)

}
}


function togglePassword(){
let input = document.getElementById("password")
let eye = document.getElementById("eye")

if(input.type === "password"){
input.type = "text"
eye.innerText = "🙈"
}else{
input.type = "password"
eye.innerText = "👁️"
}
}


function goHome(){
window.location="index.html"
}


function toggleTheme(){
document.body.classList.toggle("dark")

localStorage.setItem("theme",
document.body.classList.contains("dark") ? "dark" : "light")
}

let savedTheme = localStorage.getItem("theme")
if(savedTheme === "dark"){
document.body.classList.add("dark")
}
</script>

</body>
</html>
